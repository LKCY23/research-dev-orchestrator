# research-dev-orchestrator project defaults.
# This file configures operational defaults only. It does not define protocol
# version, task states, event types, schema fields, or FSM transitions.

[worker]
backend = "claude-code" # claude-code | codex | opencode | kimi-code
agent_name = "claude-worker"
permission_mode = "auto" # default | auto | yolo
# Optional command override for fake workers or advanced local wrappers.
# Leave empty to use agent_backends/<backend>.toml.
command = ""

[runtime]
backend = "plain" # plain | tmux
io_mode = "machine" # machine | human

[tmux]
session_prefix = "rdo"
keep_session = false
wait_timeout_seconds = 0
exit_code_grace_seconds = 60

[status]
stale_lock_hours = 6.0
stale_created_minutes = 10.0

[task]
branch_prefix = "agent/"
worktree_root = ".agent-worktrees"
