id = "codex"
display_name = "Codex"
roles = ["coordinator", "worker"]

[capabilities]
tool_stream_events = true
native_subagents = true
session_config_overrides = true
subagent_lifecycle_events = true
native_parallel_agent_limit = true
native_agent_depth_limit = true

[governance]
enable_multi_agent = true
max_agent_threads = 4
max_agent_depth = 1
enforce_spawn_limit = false

[prompt]
machine_transport = "arg"
human_transport = "arg"
max_arg_bytes = 100000

[session]
handling = "manual"

[permission_modes.default]
supported = true
args = []

[permission_modes.auto]
supported = true
args = [
  "--ask-for-approval", "on-request",
  "--sandbox", "workspace-write",
  "--enable", "guardian_approval",
  "-c", "approvals_reviewer=\"guardian_subagent\"",
]

[permission_modes.yolo]
supported = true
args = ["--dangerously-bypass-approvals-and-sandbox"]

[commands.machine]
command = "codex"
args = ["{permission_args}", "exec", "--json", "--cd", "{cwd}", "{prompt}"]

[commands.human]
command = "codex"
args = ["--cd", "{cwd}", "{permission_args}", "{prompt}"]
