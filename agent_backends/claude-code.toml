id = "claude-code"
display_name = "Claude Code"
roles = ["coordinator", "worker"]

[capabilities]
session_settings = true
pre_tool_hooks = true
subagent_lifecycle_hooks = true
tool_stream_events = true
native_subagents = true
agent_teams = true
process_level_native_agent_control = false

[governance]
disabled_plugins = ["superpowers@claude-plugins-official"]
enable_agent_teams = true
max_tool_use_concurrency = 4
enforce_spawn_limit = false

[prompt]
machine_transport = "arg"
human_transport = "arg"
max_arg_bytes = 100000

[session]
handling = "manual"

[permission_modes.default]
supported = true
args = ["--permission-mode", "default"]

[permission_modes.auto]
supported = true
args = ["--permission-mode", "auto"]

[permission_modes.yolo]
supported = true
args = ["--dangerously-skip-permissions"]

[commands.machine]
command = "claude"
args = ["-p", "--verbose", "--output-format", "stream-json", "{permission_args}", "{prompt}"]

[commands.human]
command = "claude"
args = ["{permission_args}", "--name", "{agent_name}", "{prompt}"]
